port: 3000
healthCheck:
  liveness: /healthz
  readiness: /readyz
  timeoutSeconds: 5
image:
  name: ghcr.io/square-kr/better-auth
  version: "6a65d949"
resources:
  cpu: "250m"
  memory: "512Mi"
env:
  - name: NODE_ENV
    value: production
  - name: PORT
    value: "3000"
  - name: AUTH_BASE_URL
    value: https://dev-accounts.sqr.kr
  - name: JWT_AUDIENCE
    value: square-msa
  - name: TRUSTED_ORIGINS
    value: https://dev-accounts.sqr.kr,https://dev-domain.sqr.kr
  - name: AUTH_COOKIE_DOMAIN
    value: sqr.kr
  - name: REDIS_MODE
    value: sentinel
  - name: REDIS_SENTINELS
    value: valkey:26379
  - name: REDIS_SENTINEL_MASTER_NAME
    value: primary
  - name: NOTIFICATION_BASE_URL
    value: http://notification-backend
  - name: NOTIFICATION_ENVIRONMENT
    value: DEV
  - name: NOTIFICATION_TIMEOUT_MS
    value: "10000"
  - name: NOTIFICATION_RETRIES
    value: "1"
  - name: AUTH_EMAIL_LOCALE
    value: ko
secrets:
  - better-auth
imagePullSecrets:
  - ghcr-pull-secret
