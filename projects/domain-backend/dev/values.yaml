port: 8080
healthCheck:
  liveness: /actuator/health
  readiness: /actuator/health
  timeoutSeconds: 5
image:
  name: ghcr.io/square-kr/square-domain-backend
  version: "63cc5d5e"
resources:
  cpu: "250m"
  memory: "512Mi"
env:
  - name: SPRING_PROFILES_ACTIVE
    value: stage
  - name: SERVER_PORT
    value: "8080"
  - name: LETO_ENABLED
    value: "true"
secrets:
  - domain-backend
imagePullSecrets:
  - ghcr-pull-secret
