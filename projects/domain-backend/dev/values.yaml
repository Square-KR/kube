port: 8080
healthCheck:
  liveness: /actuator/health
  readiness: /actuator/health
  timeoutSeconds: 5
image:
  name: ghcr.io/square-kr/square-domain-backend
  version: "98107351"
resources:
  cpu: "250m"
  memory: "512Mi"
env:
  - name: SPRING_PROFILES_ACTIVE
    value: dev
  - name: SERVER_PORT
    value: "8080"
  - name: AUTH_JWT_ISSUER_URI
    value: https://dev-accounts.sqr.kr
  - name: AUTH_JWT_JWK_SET_URI
    value: http://better-auth/api/auth/jwks
  - name: AUTH_JWT_AUDIENCE
    value: square-msa
  - name: LETO_ENABLED
    value: "true"
secrets:
  - domain-backend
imagePullSecrets:
  - ghcr-pull-secret
