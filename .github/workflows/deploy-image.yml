name: deploy-image

on:
  repository_dispatch:
    types: ["deploy-image"]
  workflow_dispatch:
    inputs:
      service:
        description: Service directory under projects/
        required: true
        type: string
      environment:
        description: Deployment environment
        required: true
        type: string
      version:
        description: Image tag to deploy
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ github.event.client_payload.service || inputs.service }}-${{ github.event.client_payload.environment || inputs.environment }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Validate payload
        id: payload
        env:
          SERVICE: ${{ github.event.client_payload.service || inputs.service }}
          ENVIRONMENT: ${{ github.event.client_payload.environment || inputs.environment }}
          VERSION: ${{ github.event.client_payload.version || inputs.version }}
        run: |
          set -euo pipefail

          if [[ ! "$SERVICE" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid service: $SERVICE" >&2
            exit 1
          fi

          if [[ ! "$ENVIRONMENT" =~ ^[a-z0-9][a-z0-9-]*$ ]]; then
            echo "Invalid environment: $ENVIRONMENT" >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^[A-Za-z0-9._-]+$ ]]; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi

          VALUES_FILE="projects/${SERVICE}/${ENVIRONMENT}/values.yaml"

          if [[ ! -f "$VALUES_FILE" ]]; then
            echo "Missing values file: $VALUES_FILE" >&2
            exit 1
          fi

          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "environment=$ENVIRONMENT" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "values_file=$VALUES_FILE" >> "$GITHUB_OUTPUT"

      - name: Update image version
        uses: mikefarah/yq@v4.46.1
        with:
          cmd: yq -i '.image.version = "${{ steps.payload.outputs.version }}"' '${{ steps.payload.outputs.values_file }}'

      - name: Commit and push changes
        run: |
          set -euo pipefail

          if git diff --quiet -- "${{ steps.payload.outputs.values_file }}"; then
            echo "No image update needed."
            exit 0
          fi

          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add "${{ steps.payload.outputs.values_file }}"
          git commit -m "chore(bot): update ${{ steps.payload.outputs.service }} image to ${{ steps.payload.outputs.version }}"
          git push origin main
